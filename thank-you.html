<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4581f6;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e0e6ed;
      --text: #15304f;
      --muted: #5b6b85;
      --success: #16a34a;
      --radius: 1.1rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      background: radial-gradient(1200px 600px at 20% 10%, rgba(69,129,246,0.12), transparent 55%),
                  radial-gradient(900px 500px at 80% 0%, rgba(22,163,74,0.10), transparent 50%),
                  var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .wrap {
      width: 100%;
      max-width: 740px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 14px 40px rgba(20, 45, 80, 0.10);
      padding: 2.2rem 2.2rem;
    }
    .header {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 1.2rem;
    }
    .icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(22,163,74,0.12);
      color: var(--success);
      border: 1px solid rgba(22,163,74,0.22);
      flex: 0 0 auto;
    }
    h1 {
      margin: 0;
      font-size: 1.85rem;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }
    p {
      margin: 0.25rem 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 1.02rem;
    }
    .actions {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 1.6rem;
      align-items: center;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.2rem;
      border-radius: 0.9rem;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
      user-select: none;
    }
    a.btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 25px rgba(69,129,246,0.22);
    }
    .btn-primary:hover { background: #2956a6; }
    .btn-secondary {
      background: rgba(21,48,79,0.03);
      color: var(--text);
      border-color: rgba(21,48,79,0.12);
    }
    .btn-secondary:hover { background: rgba(21,48,79,0.06); }
    .footnote {
      margin-top: 1.1rem;
      font-size: 0.92rem;
      color: rgba(91,107,133,0.95);
    }
    @media (max-width: 560px) {
      .card { padding: 1.6rem 1.2rem; }
      h1 { font-size: 1.55rem; }
      .icon { width: 46px; height: 46px; border-radius: 14px; }
      a.btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Submission success">
      <div class="header">
        <div class="icon" aria-hidden="true">
          <i class="fas fa-check"></i>
        </div>
        <div>
          <h1>Thank you for your response</h1>
          <p>Your submission has been recorded successfully. We appreciate you taking the time to complete the survey.</p>
        </div>
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="index.html">
          <i class="fas fa-arrow-left"></i>
          Back to Survey
        </a>
        <a class="btn btn-secondary" href="index.html" onclick="window.location.href='index.html'; return false;">
          <i class="fas fa-rotate-left"></i>
          Submit another response
        </a>
      </div>

      <div class="footnote">You can safely close this tab.</div>
    </section>
  </main>
</body>
</html>
