<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mixer Grinder User Survey</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4581f6;
      --secondary: #f2f7ff;
      --bg: #f8fafc;
      --card-bg: #fff;
      --border: #e0e6ed;
      --radius: 1rem;
      --gap: 2rem;
      --section-padding: 1.6rem 2rem;
      --label-color: #24324a;
      --input-bg: #f4f8fc;
    }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #15304f;
    }
    h1 {
      text-align: center;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
      font-size: 2.4rem;
      color: var(--primary);
      letter-spacing: 1px;
    }
    .survey-container {
      max-width: 780px;
      margin: auto;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }
    form {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }
    .section-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(80, 120, 240, 0.08), 0 1.5px 0px var(--border);
      padding: var(--section-padding);
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 0.2rem;
      font-weight: 600;
    }
    label {
      display: block;
      font-weight: 500;
      color: var(--label-color);
      margin-bottom: 0.4rem;
      letter-spacing: 0.1px;
    }
    input[type="text"], 
    input[type="number"], 
    input[type="email"], 
    select, 
    textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--input-bg);
      font-size: 1rem;
      box-sizing: border-box;
      margin-bottom: 0.6rem;
      transition: border 0.2s;
    }
    input[type="text"]:focus, 
    input[type="number"]:focus, 
    textarea:focus, 
    select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .options-row {
      display: flex;
      gap: 2rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .options-row label {
      margin-bottom: 0;
      font-weight: normal;
      color: #46597a;
    }
    textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 200px;
    }
    .submit-btn {
      width: 220px;
      align-self: center;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 0.7rem;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 0.9rem 2.2rem;
      margin-top: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(80,120,220,0.10);
      transition: background 0.16s;
    }
    .submit-btn:hover {
      background: #2956a6;
    }
    @media (max-width:700px) {
      .survey-container { padding: 0.5rem; }
      .section-card { padding: 1rem; }
      .section-header { font-size: 1.2rem; gap: 0.7rem;}
      .submit-btn { width: 100%; font-size: 1rem;}
    }
  </style>
</head>
<body>
  <h1><i class="fas fa-blender"></i> Mixer Grinder User Survey</h1>
  <div class="survey-container">
    <form id="surveyForm" novalidate>
      <!-- 1. Basic Details -->
      <div class="section-card">
        <div class="section-header"><i class="fas fa-user"></i> Basic Details</div>
        <div>
          <label for="brand">1. What is the brand of your Mixer Grinder?</label>
          <input type="text" id="brand" name="brand" placeholder="E.g., Philips, Bajaj" required>
        </div>
        <div>
          <label for="jars">2. How many jars does it come with?</label>
          <input type="number" id="jars" name="jars" placeholder="Number of jars" min="1" required>
        </div>
        <div>
          <label for="power">3. What is its power rating (in Watts)?</label>
          <input type="number" id="power" name="power" placeholder="E.g., 750" min="100" max="2500" required>
        </div>
        <div>
          <label for="years">4. How many years have you been using it?</label>
          <input type="number" id="years" name="years" min="0" max="50" placeholder="Years of usage" required>
        </div>
        <div>
          <label for="frequency">5. How frequently do you use it?</label>
          <select id="frequency" name="frequency" required>
            <option value="">Choose</option>
            <option>Almost daily</option>
            <option>3–5 times a week</option>
            <option>1–2 times a week</option>
            <option>Less than once a week</option>
          </select>
        </div>
      </div>
      
      <!-- 2. Usage -->
      <div class="section-card">
        <div class="section-header"><i class="fas fa-utensils"></i> Usage</div>
        <div>
          <label for="mainuse">6. What is your main use?</label>
          <select id="mainuse" name="mainuse" required>
            <option value="">Choose</option>
            <option>Grinding</option>
            <option>Blending</option>
            <option>Juicing</option>
          </select>
        </div>
        <div>
          <label for="ingredients">7. What types of ingredients do you mostly process? <small>(Check all that apply)</small></label>
          <div class="options-row">
            <label><input type="checkbox" name="ingredients" value="Spices"> Spices</label>
            <label><input type="checkbox" name="ingredients" value="Dry foods"> Dry foods</label>
            <label><input type="checkbox" name="ingredients" value="Wet pastes"> Wet pastes</label>
            <label><input type="checkbox" name="ingredients" value="Fruits"> Fruits</label>
            <label><input type="checkbox" name="ingredients" value="Vegetables"> Vegetables</label>
            <label><input type="checkbox" name="ingredients" value="Others"> Others</label>
          </div>
        </div>
        <div>
          <label for="dailyduration">8. On average, how long do you use the mixer per day?</label>
          <select id="dailyduration" name="dailyduration" required>
            <option value="">Choose</option>
            <option>Less than 5 minutes</option>
            <option>5-15 minutes</option>
            <option>15-30 minutes</option>
            <option>More than 30 minutes</option>
          </select>
        </div>
        <div>
          <label>9. Do you use all the provided jars?</label>
          <div class="options-row">
            <label><input type="radio" name="alljars" value="Yes" required> Yes</label>
            <label><input type="radio" name="alljars" value="No" required> No</label>
            <label><input type="radio" name="alljars" value="Sometimes" required> Sometimes</label>
          </div>
        </div>
      </div>

      <!-- 3. Performance -->
      <div class="section-card">
        <div class="section-header"><i class="fas fa-tachometer-alt"></i> Performance</div>
        <div>
          <label>10. How would you rate its grinding efficiency?</label>
          <div class="options-row">
            <label><input type="radio" name="grinding_eff" value="1" required> 1</label>
            <label><input type="radio" name="grinding_eff" value="2"> 2</label>
            <label><input type="radio" name="grinding_eff" value="3"> 3</label>
            <label><input type="radio" name="grinding_eff" value="4"> 4</label>
            <label><input type="radio" name="grinding_eff" value="5"> 5 (Excellent)</label>
          </div>
        </div>
        <div>
          <label>11. Rate the smoothness of the output:</label>
          <div class="options-row">
            <label><input type="radio" name="smoothness" value="1" required> 1</label>
            <label><input type="radio" name="smoothness" value="2"> 2</label>
            <label><input type="radio" name="smoothness" value="3"> 3</label>
            <label><input type="radio" name="smoothness" value="4"> 4</label>
            <label><input type="radio" name="smoothness" value="5"> 5 (Very Smooth)</label>
          </div>
        </div>
        <div>
          <label>12. Are you satisfied with the noise level?</label>
          <div class="options-row">
            <label><input type="radio" name="noise" value="Very satisfied" required> Very satisfied</label>
            <label><input type="radio" name="noise" value="Satisfied"> Satisfied</label>
            <label><input type="radio" name="noise" value="Neutral"> Neutral</label>
            <label><input type="radio" name="noise" value="Unsatisfied"> Unsatisfied</label>
          </div>
        </div>
        <div>
          <label>13. Rate the motor performance:</label>
          <div class="options-row">
            <label><input type="radio" name="motor_perf" value="Excellent" required> Excellent</label>
            <label><input type="radio" name="motor_perf" value="Good"> Good</label>
            <label><input type="radio" name="motor_perf" value="Average"> Average</label>
            <label><input type="radio" name="motor_perf" value="Poor"> Poor</label>
          </div>
        </div>
        <div>
          <label>14. Have you faced overheating issues?</label>
          <div class="options-row">
            <label><input type="radio" name="overheating" value="Never" required> Never</label>
            <label><input type="radio" name="overheating" value="Rarely"> Rarely</label>
            <label><input type="radio" name="overheating" value="Occasionally"> Occasionally</label>
            <label><input type="radio" name="overheating" value="Frequently"> Frequently</label>
          </div>
        </div>
      </div>
      
      <!-- 4. Build & Design -->
      <div class="section-card">
        <div class="section-header"><i class="fas fa-cubes"></i> Build &amp; Design</div>
        <div>
          <label>15. Are you satisfied with blade quality?</label>
          <div class="options-row">
            <label><input type="radio" name="blade_quality" value="Very Satisfied" required> Very Satisfied</label>
            <label><input type="radio" name="blade_quality" value="Satisfied"> Satisfied</label>
            <label><input type="radio" name="blade_quality" value="Neutral"> Neutral</label>
            <label><input type="radio" name="blade_quality" value="Unsatisfied"> Unsatisfied</label>
          </div>
        </div>
        <div>
          <label>16. How durable do you find the jars?</label>
          <div class="options-row">
            <label><input type="radio" name="jar_durability" value="Very durable" required> Very durable</label>
            <label><input type="radio" name="jar_durability" value="Durable"> Durable</label>
            <label><input type="radio" name="jar_durability" value="Somewhat durable"> Somewhat durable</label>
            <label><input type="radio" name="jar_durability" value="Not durable"> Not durable</label>
          </div>
        </div>
        <div>
          <label>17. How easy is it to clean?</label>
          <div class="options-row">
            <label><input type="radio" name="cleaning" value="Very easy" required> Very easy</label>
            <label><input type="radio" name="cleaning" value="Easy"> Easy</label>
            <label><input type="radio" name="cleaning" value="Average"> Average</label>
            <label><input type="radio" name="cleaning" value="Difficult"> Difficult</label>
          </div>
        </div>
        <div>
          <label>18. Are you happy with the lid tightness?</label>
          <div class="options-row">
            <label><input type="radio" name="lid_tightness" value="Always fits well" required> Always fits well</label>
            <label><input type="radio" name="lid_tightness" value="Sometimes loose"> Sometimes loose</label>
            <label><input type="radio" name="lid_tightness" value="Rarely fits"> Rarely fits</label>
          </div>
        </div>
      </div>

      <!-- 5. Issues & Maintenance -->
      <div class="section-card">
        <div class="section-header"><i class="fas fa-tools"></i> Issues &amp; Maintenance</div>
        <div>
          <label>19. Have you had any breakdowns?</label>
          <div class="options-row">
            <label><input type="radio" name="breakdowns" value="No" required> No</label>
            <label><input type="radio" name="breakdowns" value="Once"> Once</label>
            <label><input type="radio" name="breakdowns" value="More than once"> More than once</label>
          </div>
        </div>
        <div>
          <label for="service_freq">20. How often do you get it serviced?</label>
          <select id="service_freq" name="service_freq" required>
            <option value="">Choose</option>
            <option>Yearly</option>
            <option>Every 2-3 years</option>
            <option>Only when required</option>
            <option>Never serviced</option>
          </select>
        </div>
        <div>
          <label>21. Is it easy to find spare parts?</label>
          <div class="options-row">
            <label><input type="radio" name="spare_parts" value="Very easy" required> Very easy</label>
            <label><input type="radio" name="spare_parts" value="Somewhat easy"> Somewhat easy</label>
            <label><input type="radio" name="spare_parts" value="Not easy"> Not easy</label>
            <label><input type="radio" name="spare_parts" value="Never tried"> Never tried</label>
          </div>
        </div>
      </div>

      <!-- 6. Feedback -->
      <div class="section-card">
        <div class="section-header"><i class="fas fa-comment-dots"></i> Feedback</div>
        <div>
          <label>22. How satisfied are you overall?</label>
          <div class="options-row">
            <label><input type="radio" name="overall_satisfaction" value="Very satisfied" required> Very satisfied</label>
            <label><input type="radio" name="overall_satisfaction" value="Satisfied"> Satisfied</label>
            <label><input type="radio" name="overall_satisfaction" value="Neutral"> Neutral</label>
            <label><input type="radio" name="overall_satisfaction" value="Unsatisfied"> Unsatisfied</label>
            <label><input type="radio" name="overall_satisfaction" value="Very unsatisfied"> Very unsatisfied</label>
          </div>
        </div>
        <div>
          <label>23. Do you feel it offers value for money?</label>
          <div class="options-row">
            <label><input type="radio" name="value" value="Yes" required> Yes</label>
            <label><input type="radio" name="value" value="No"> No</label>
            <label><input type="radio" name="value" value="Partially"> Partially</label>
          </div>
        </div>
        <div>
          <label>24. Would you recommend it to others?</label>
          <div class="options-row">
            <label><input type="radio" name="recommend" value="Definitely" required> Definitely</label>
            <label><input type="radio" name="recommend" value="Maybe"> Maybe</label>
            <label><input type="radio" name="recommend" value="No"> No</label>
          </div>
        </div>
        <div>
          <label for="improvements">25. Any suggested improvements?</label>
          <textarea id="improvements" name="improvements" placeholder="Your suggestions..."></textarea>
        </div>
      </div>
      <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Submit Survey</button>
    </form>
  </div>
  <script>
    (function () {
      const form = document.getElementById('surveyForm');
      if (!form) return;

      form.addEventListener('submit', function (e) {
        // Use native browser validation UI.
        if (!form.checkValidity()) return;
        e.preventDefault();
        window.location.assign('thank-you.html');
      });
    })();
  </script>
</body>
</html>
